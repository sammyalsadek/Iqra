<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iqra — Quran vocabulary flashcards">
  <meta property="og:title" content="Iqra — Quran Vocabulary">
  <meta property="og:description" content="Quran vocabulary flashcards">
  <meta property="og:image" content="/logo.svg">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#F7F4EE" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#141A24" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Iqra">
  <title>Iqra — Quran Vocabulary</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://audio.qurancdn.com">
  <style>
    .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem}
    .splash-logo{display:block}
    .splash-logo-dark{display:none}
    .splash-text{font-family:'Segoe UI',system-ui,sans-serif;font-size:.875rem;color:#5C5647}
    .splash-loader{width:160px;height:4px;background:#EDE8DF;border-radius:2px;overflow:hidden}
    .splash-loader-bar{height:100%;background:#2D6A4F;border-radius:2px;will-change:transform}
    .splash ~ .skip-link{display:none}
    body:has(.splash) .skip-link{display:none}
    @media(prefers-color-scheme:dark){
      html:not(.light) body{background:#141A24}
      html:not(.light) .splash-logo-light{display:none}html:not(.light) .splash-logo-dark{display:block}
      html:not(.light) .splash-text{color:#9C978C}
      html:not(.light) .splash-loader{background:#2A3142}
      html:not(.light) .splash-loader-bar{background:#4A9B6A}
    }
    html.dark body{background:#141A24}
    html.dark .splash-logo-light{display:none}html.dark .splash-logo-dark{display:block}
    html.dark .splash-text{color:#9C978C}
    html.dark .splash-loader{background:#2A3142}
    html.dark .splash-loader-bar{background:#4A9B6A}
  </style>
</head>
<body>
  <script>
    (function(){var t=localStorage.getItem('iqra-theme');if(t==='dark')document.documentElement.classList.add('dark');else if(t==='light')document.documentElement.classList.add('light')})();
  </script>
  <a href="#main" class="skip-link">Skip to content</a>
  <main id="main">
    <div id="app-nav"></div>
    <div class="splash" id="splash">
      <img src="/title-light.svg" alt="Iqra" class="splash-logo splash-logo-light" width="200" height="200">
      <img src="/title-dark.svg" alt="Iqra" class="splash-logo splash-logo-dark" width="200" height="200">
      <div class="splash-loader"><div class="splash-loader-bar"></div></div>
    </div>
  </main>
  <footer class="app-footer">
    Audio powered by <a href="https://quran.com" target="_blank" rel="noopener">quran.com</a>
  </footer>
  <noscript>
    <p style="text-align:center;padding:2rem">JavaScript is required to use Iqra.</p>
  </noscript>
  <script>
    (function(){
      var bar=document.querySelector('.splash-loader-bar');
      if(!bar)return;
      var track=160;
      var dur=1100;
      var start=performance.now();
      function tick(now){
        var t=(((now-start)%dur)/dur);/* 0→1 linear progress */
        /* Ease: accelerate in middle, decelerate at edges */
        var ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
        /* Bar width: narrow at edges, wide in middle */
        var width=32+40*Math.sin(t*Math.PI);
        /* Position: start off-screen left, end off-screen right */
        var x=-width+ease*(track+width);
        bar.style.width=width+'px';
        bar.style.transform='translateX('+x+'px)';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
